<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Login</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:#f4f6fb;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh
}
.app{width:100%;max-width:720px}
.card{
  background:#fff;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  padding:20px;
}
.tabs{
  display:flex;
  background:#eef1f6;
  border-radius:10px;
  margin-bottom:20px
}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer}
.tab.active{background:#fff;font-weight:600}
.hidden{display:none}
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #dcdfe6;
}
button{background:#243b6b;color:#fff;border:none;cursor:pointer}
</style>

</head>

<body>
<div class="app">
<div class="card">

<h1>Portal Login</h1>

<div class="tabs">
  <div class="tab active" id="studentTab">Student</div>
  <div class="tab" id="adminTab">Admin</div>
</div>

<div id="studentLogin">
  <form method="POST" action="/student_login">
    <input name="roll" placeholder="Roll Number" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<div id="adminLogin" class="hidden">
  <form method="POST" action="/admin_login">
    <input name="aid" placeholder="Admin ID" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
</div>

</div>
</div>

<script>
const studentTab = document.getElementById('studentTab');
const adminTab = document.getElementById('adminTab');
const studentLogin = document.getElementById('studentLogin');
const adminLogin = document.getElementById('adminLogin');

studentTab.onclick = () => {
  studentLogin.classList.remove('hidden');
  adminLogin.classList.add('hidden');
  studentTab.classList.add('active');
  adminTab.classList.remove('active');
}
adminTab.onclick = () => {
  adminLogin.classList.remove('hidden');
  studentLogin.classList.add('hidden');
  adminTab.classList.add('active');
  studentTab.classList.remove('active');
}
</script>

</body>
</html>
